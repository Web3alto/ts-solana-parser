name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Verify dist artifacts
        run: |
          test -f dist/lib.js || (echo "dist/lib.js missing" && exit 1)
          test -f dist/lib.d.ts || (echo "dist/lib.d.ts missing" && exit 1)

      - name: Typecheck (tsgo)
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Test
        run: bun run test
